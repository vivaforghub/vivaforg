<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VivaForge Grammar Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container{
  max-width:650px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
  animation:fadeIn .4s ease-in;
}

h1{color:#38bdf8;}

.level{
  color:#fbbf24;
  font-weight:bold;
}

button{
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:scale(1.03);
  background:#0ea5e9;
}

#timer{
  color:#f87171;
  font-weight:bold;
}

.progress{
  height:8px;
  background:#334155;
  border-radius:10px;
  margin:10px 0;
}

.bar{
  height:8px;
  background:#22c55e;
  width:0%;
  border-radius:10px;
  transition:.3s;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

@media(max-width:600px){
  .container{width:95%;}
}
</style>

</head>

<body>

<div class="container">
  <h1>VivaForge Grammar Game</h1>

  <div class="card">
    <p class="level" id="levelText">Level: Easy</p>
    <p>Score: <span id="score">0</span></p>
    <p id="timer">Time: 10</p>

    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>

    <h2 id="question">Loading...</h2>
    <div id="options"></div>
    <p id="result"></p>
  </div>
</div>

<script>
let score=0;
let index=0;
let time=10;
let timer;
let correctStreak=0;

const questions=[
  // EASY
  {level:"Easy",q:"I ___ a student.",options:["am","is","are"],answer:"am"},
  {level:"Easy",q:"She ___ playing.",options:["is","are","am"],answer:"is"},

  // MEDIUM
  {level:"Medium",q:"He ___ to school daily.",options:["go","goes","gone"],answer:"goes"},
  {level:"Medium",q:"They ___ happy.",options:["is","are","am"],answer:"are"},

  // HARD
  {level:"Hard",q:"If I ___ rich, I would travel.",options:["was","am","were"],answer:"were"},
  {level:"Hard",q:"She ___ finished her work.",options:["has","have","had"],answer:"has"}
];

function loadQuestion(){
  clearInterval(timer);
  time=10;

  let q=questions[index];

  document.getElementById("question").innerText=q.q;
  document.getElementById("levelText").innerText="Level: "+q.level;

  let html="";
  q.options.forEach(opt=>{
    html+=`<button onclick="check('${opt}')">${opt}</button>`;
  });

  document.getElementById("options").innerHTML=html;
  document.getElementById("result").innerText="";

  startTimer();
  updateProgress();
}

function startTimer(){
  document.getElementById("timer").innerText="Time: "+time;

  timer=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="Time: "+time;

    if(time<=0){
      clearInterval(timer);
      next();
    }
  },1000);
}

function check(ans){
  let correct=questions[index].answer;

  if(ans===correct){
    score+=10;
    correctStreak++;
    document.getElementById("result").innerText="Correct!";
  }else{
    correctStreak=0;
    document.getElementById("result").innerText="Wrong! Answer: "+correct;
  }

  document.getElementById("score").innerText=score;

  clearInterval(timer);
  setTimeout(next,700);
}

function next(){
  index++;

  if(index>=questions.length){
    endGame();
    return;
  }

  loadQuestion();
}

function updateProgress(){
  let percent=(index/questions.length)*100;
  document.getElementById("bar").style.width=percent+"%";
}

function endGame(){
  document.querySelector(".card").innerHTML=`
    <h2>Game Finished 🎯</h2>
    <h3>Your Score: ${score}</h3>
    <p>Accuracy: ${(score/(questions.length*10))*100}%</p>
    <button onclick="location.reload()">Play Again</button>
  `;
}

loadQuestion();
</script>

</body>
</html>
