<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VivaForge App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.header{
  color:#38bdf8;
  font-size:28px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  cursor:pointer;
  transition:.2s;
  font-weight:bold;
}

.card:hover{
  transform:scale(1.05);
  background:#334155;
}

.screen{
  display:none;
  animation:fade .3s ease-in;
}

.active{
  display:block;
}

button{
  padding:10px;
  margin:5px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0ea5e9;
}

.badge{
  background:#22c55e;
  padding:5px 10px;
  border-radius:20px;
  display:inline-block;
  margin:5px;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
</style>

</head>

<body>

<div class="container">

  <!-- HOME SCREEN -->
  <div id="home" class="screen active">
    <div class="header">VivaForge App</div>

    <p>🔥 Streak: <span id="streak">0</span> days</p>
    <p>⭐ Score: <span id="score">0</span></p>

    <div class="grid">

      <div class="card" onclick="openGame('quiz')">🎮 Quiz Game</div>
      <div class="card" onclick="openGame('grammar')">📘 Grammar</div>
      <div class="card" onclick="openGame('fill')">✍ Fill Blanks</div>
      <div class="card" onclick="openGame('scramble')">🔀 Scramble</div>
      <div class="card" onclick="openGame('speed')">⚡ Speed Test</div>

    </div>

    <br>
    <div class="badge">Daily Reward: +10 points</div>
    <button onclick="reward()">Claim Reward</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game" class="screen">

    <h2 id="gTitle"></h2>
    <p id="question"></p>

    <div id="options"></div>

    <p id="result"></p>

    <button onclick="backHome()">Back</button>
  </div>

</div>

<script>

// SOUND EFFECTS
function sound(type){
  let audio = new Audio();
  if(type=="correct"){
    audio.src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg";
  }else{
    audio.src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg";
  }
  audio.play();
}

// DATA
let score = localStorage.getItem("score") || 0;
let streak = localStorage.getItem("streak") || 0;

document.getElementById("score").innerText = score;
document.getElementById("streak").innerText = streak;

const games = {
 quiz:[
   {q:"I ___ a student",o:["am","is","are"],a:"am"},
   {q:"She ___ happy",o:["is","are","am"],a:"is"}
 ],
 grammar:[
   {q:"He ___ to school daily",o:["go","goes","gone"],a:"goes"}
 ],
 fill:[
   {q:"She ___ playing football",o:["is","are"],a:"is"}
 ],
 scramble:[
   {q:"Arrange: student / I / am",o:["I am student","am I student"],a:"I am student"}
 ],
 speed:[
   {q:"Quick: 2+2=?",o:["3","4","5"],a:"4"}
 ]
};

let currentGame = [];
let index = 0;

// OPEN GAME
function openGame(type){
  document.getElementById("home").classList.remove("active");
  document.getElementById("game").classList.add("active");

  currentGame = games[type];
  index = 0;

  document.getElementById("gTitle").innerText = type.toUpperCase();

  loadQ();
}

// LOAD QUESTION
function loadQ(){
  let q = currentGame[index];

  document.getElementById("question").innerText = q.q;

  let html = "";
  q.o.forEach(opt=>{
    html += `<button onclick="check('${opt}')">${opt}</button>`;
  });

  document.getElementById("options").innerHTML = html;
}

// CHECK ANSWER
function check(ans){
  let correct = currentGame[index].a;

  if(ans === correct){
    score = Number(score) + 10;
    streak = Number(streak) + 1;
    sound("correct");
    document.getElementById("result").innerText = "Correct!";
  }else{
    streak = 0;
    sound("wrong");
    document.getElementById("result").innerText = "Wrong! Ans: " + correct;
  }

  localStorage.setItem("score", score);
  localStorage.setItem("streak", streak);

  document.getElementById("score").innerText = score;
  document.getElementById("streak").innerText = streak;

  index++;

  setTimeout(()=>{
    if(index < currentGame.length){
      loadQ();
    }else{
      document.getElementById("question").innerText = "Game Finished!";
      document.getElementById("options").innerHTML = "";
    }
  },600);
}

// BACK HOME
function backHome(){
  document.getElementById("game").classList.remove("active");
  document.getElementById("home").classList.add("active");
}

// DAILY REWARD
function reward(){
  score = Number(score) + 10;
  localStorage.setItem("score", score);
  document.getElementById("score").innerText = score;
  alert("Daily Reward Claimed!");
}

</script>

</body>
</html>
